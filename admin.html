<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="css/pages/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

<!-- Login Page -->
<div class="login-page" id="login-page">
    <div class="login-box">
        <h1>Fragrance by <span>Nola</span></h1>
        <h3>Admin Dashboard</h3>
        <div class="login-form">
            <input type="password" id="password-input" placeholder="Enter password">
            <button id="login-btn">Login</button>
            <p class="login-error" id="login-error">Incorrect password. Try again.</p>
        </div>
    </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard" style="display:none;">
    <button class="sidebar-toggle" id="sidebar-toggle">
        <span class="material-symbols-outlined">menu</span>
    </button>

    <aside class="sidebar">
        <h2>Fragrance by <span>Nola</span></h2>
        <nav>
            <button class="nav-btn active" onclick="showTab('products')">
                <span class="material-symbols-outlined">inventory_2</span> Products
            </button>
            <button class="nav-btn" onclick="showTab('add')">
                <span class="material-symbols-outlined">add_circle</span> Add Product
            </button>
        </nav>
        <button class="logout-btn" onclick="logout()">
            <span class="material-symbols-outlined">logout</span> Logout
        </button>
    </aside>

    <main class="main-content">

        <!-- Products Tab -->
        <div class="tab" id="tab-products">
            <div class="tab-header">
                <h2>All Products</h2>
            </div>
            <div class="admin-product-grid" id="admin-product-grid">
                <!-- products load here -->
            </div>
        </div>

        <!-- Add Product Tab -->
        <div class="tab" id="tab-add" style="display:none;">
            <div class="tab-header">
                <h2 id="form-title">Add New Product</h2>
            </div>
            <div class="product-form">
                <input type="hidden" id="edit-id">
                
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" placeholder="e.g. Kaly">
                </div>

                <div class="form-group">
                    <label>Price (₦)</label>
                    <input type="number" id="prod-price" placeholder="e.g. 10000">
                </div>

                <div class="form-group">
                    <label>Size</label>
                    <input type="text" id="prod-size" placeholder="e.g. 50ml (leave empty if none)">
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="prod-category">
                        <option value="perfume">Perfume</option>
                        <option value="body-spray">Body Spray</option>
                        <option value="roll-on">Roll-on</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Product Image</label>
                    <input type="file" id="prod-image" accept="image/*">
                    <div class="image-preview" id="image-preview" style="display:none;">
                        <img id="preview-img" src="" alt="Preview">
                    </div>
                </div>

                <div class="form-btns">
                    <button class="save-btn" onclick="saveProduct()">
                        <span class="material-symbols-outlined">save</span>
                        <span id="save-btn-text">Save Product</span>
                    </button>
                    <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
                </div>

                <div class="form-status" id="form-status"></div>
            </div>
        </div>

    </main>
</div>

<script type="module" src="js/pages/admin.js"></script>
</body>
</html>
